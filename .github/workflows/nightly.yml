name: Nightly Build

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or commit SHA to build (default: main)'
        required: false
        type: string
        default: main

permissions:
  contents: write

jobs:
  nightly:
    name: Nightly
    runs-on: macos-latest
    environment: production
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-

      - name: Cache Dashboard target
        uses: actions/cache@v4
        with:
          path: apps/dashboard/src-tauri/target
          key: cargo-dashboard-${{ runner.os }}-${{ hashFiles('apps/dashboard/src-tauri/Cargo.lock') }}
          restore-keys: cargo-dashboard-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute nightly version
        id: version
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          BASE_VERSION=$(node -p "require('./package.json').version")
          DATE=$(date -u +%Y%m%d)
          SHORT_SHA=$(echo "$GH_SHA" | cut -c1-7)
          NIGHTLY_VERSION="${BASE_VERSION}-nightly.${DATE}.${SHORT_SHA}"
          {
            echo "nightly_version=$NIGHTLY_VERSION"
            echo "short_sha=$SHORT_SHA"
            echo "date=$DATE"
          } >> "$GITHUB_OUTPUT"
          echo "Nightly version: $NIGHTLY_VERSION"

      - name: Lint
        run: |
          pnpm exec biome check .
          pnpm knip
          pnpm jscpd
          cargo fmt --manifest-path apps/cli/Cargo.toml -- --check
          cargo fmt --manifest-path apps/dashboard/src-tauri/Cargo.toml -- --check
          cargo clippy --manifest-path apps/cli/Cargo.toml -- -D warnings

      - name: Build CLI
        run: pnpm build:cli

      - name: Download Bun runtime
        run: pnpm download:bun

      - name: Lint (cargo clippy — Dashboard)
        run: |
          mkdir -p apps/web/dist
          touch apps/web/dist/start-server.mjs
          cargo clippy --manifest-path apps/dashboard/src-tauri/Cargo.toml -- -D warnings

      - name: Test
        run: |
          pnpm --filter @band-app/server test
          cargo test --manifest-path apps/cli/Cargo.toml
          mkdir -p apps/web/dist
          touch apps/web/dist/start-server.mjs
          cargo test --manifest-path apps/dashboard/src-tauri/Cargo.toml
          rm -rf apps/web/dist

      - name: Build frontend
        env:
          BAND_BUILD_SHA: ${{ github.sha }}
          BAND_BUILD_CHANNEL: nightly
        run: |
          pnpm build:web
          pnpm --filter @band-app/dashboard build

      - name: Apple sign setup
        uses: ./.github/actions/apple-sign-setup
        with:
          apple-certificate: ${{ secrets.APPLE_CERTIFICATE }}
          apple-certificate-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          apple-api-key: ${{ secrets.APPLE_API_KEY }}

      - name: Build DMG (nightly version override)
        env:
          NIGHTLY_VERSION: ${{ steps.version.outputs.nightly_version }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/api-key.p8
        run: |
          set -euo pipefail
          NIGHTLY_OVERRIDE=$(jq -n --arg v "$NIGHTLY_VERSION" '{version: $v, productName: "Band Nightly", identifier: "app.getband.night-agent"}')
          pnpm --filter @band-app/dashboard tauri build --ci \
            --config '{"build":{"beforeBuildCommand":""}}' \
            --config src-tauri/tauri.prod.conf.json \
            --config "$NIGHTLY_OVERRIDE"

      - name: Apple sign cleanup
        if: always()
        uses: ./.github/actions/apple-sign-cleanup

      - name: Collect artifacts
        id: artifacts
        env:
          NIGHTLY_VERSION: ${{ steps.version.outputs.nightly_version }}
        run: |
          set -euo pipefail
          BUNDLE_DIR="apps/dashboard/src-tauri/target/release/bundle"
          STAGING="$RUNNER_TEMP/nightly-artifacts"
          mkdir -p "$STAGING"
          for f in "$BUNDLE_DIR"/dmg/*.dmg; do
            cp "$f" "$STAGING/Band-${NIGHTLY_VERSION}.dmg"
          done
          echo "staging=$STAGING" >> "$GITHUB_OUTPUT"
          ls -la "$STAGING"

      - name: Publish rolling "nightly" GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          NIGHTLY_VERSION: ${{ steps.version.outputs.nightly_version }}
          STAGING: ${{ steps.artifacts.outputs.staging }}
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          TAG="nightly"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" \
            --target "$GH_SHA" \
            --title "Nightly build ($NIGHTLY_VERSION)" \
            --notes "Latest unstable build from main. Version: $NIGHTLY_VERSION. Commit: $GH_SHA. Not published to stable updater channel." \
            --prerelease \
            "$STAGING"/*
