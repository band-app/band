name: Nightly Build

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or commit SHA to build (default: main)'
        required: false
        type: string
        default: main

permissions:
  contents: write

jobs:
  nightly:
    name: Nightly
    runs-on: macos-latest
    environment: production
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-

      - name: Cache CLI target
        uses: actions/cache@v5
        with:
          path: apps/cli/target
          key: cargo-cli-${{ runner.os }}-${{ hashFiles('apps/cli/Cargo.lock') }}
          restore-keys: cargo-cli-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute nightly version
        id: version
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          BASE_VERSION=$(node -p "require('./package.json').version")
          DATE=$(date -u +%Y%m%d)
          SHORT_SHA=$(echo "$GH_SHA" | cut -c1-7)
          NIGHTLY_VERSION="${BASE_VERSION}-nightly.${DATE}.${SHORT_SHA}"
          {
            echo "nightly_version=$NIGHTLY_VERSION"
            echo "short_sha=$SHORT_SHA"
            echo "date=$DATE"
          } >> "$GITHUB_OUTPUT"
          echo "Nightly version: $NIGHTLY_VERSION"

      - name: Override version for nightly
        env:
          NIGHTLY_VERSION: ${{ steps.version.outputs.nightly_version }}
        run: |
          set -euo pipefail
          # Stamp the nightly version into the root + apps/desktop manifests so
          # both the Electron build and the in-app About panel report it.
          node -e "
            const fs = require('fs');
            for (const path of ['package.json', 'apps/desktop/package.json', 'apps/web/package.json']) {
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkg.version = process.env.NIGHTLY_VERSION;
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            }
          "

      - name: Lint
        run: |
          pnpm exec biome check .
          pnpm knip
          pnpm jscpd
          cargo fmt --manifest-path apps/cli/Cargo.toml -- --check
          cargo clippy --manifest-path apps/cli/Cargo.toml -- -D warnings

      # Build the CLI before running the JS tests. Some tests (e.g.
      # `apps/web/tests/cli-skills.test.ts`) shell out to `band skills install`
      # to verify the production sync path against the real binary. The cargo
      # cache key only hashes `apps/cli/Cargo.lock`, so a source-only change
      # (skill templates, command surface) restores a stale binary that
      # produces output mismatched with the current test expectations and the
      # cli-skills suite then fails because its skip guard misfires. ci.yml and
      # release.yml both do this — mirror it here so nightly runs aren't
      # tripped up by the same staleness.
      - name: Build CLI
        run: cargo build --release --manifest-path apps/cli/Cargo.toml

      - name: Test
        run: |
          pnpm --filter @band-app/server test
          cargo test --manifest-path apps/cli/Cargo.toml

      - name: Build frontend
        env:
          BAND_BUILD_SHA: ${{ github.sha }}
          BAND_BUILD_CHANNEL: nightly
        run: pnpm build:web

      - name: Apple sign setup
        uses: ./.github/actions/apple-sign-setup
        with:
          apple-certificate: ${{ secrets.APPLE_CERTIFICATE }}
          apple-certificate-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          apple-api-key: ${{ secrets.APPLE_API_KEY }}

      - name: Build desktop (Electron) macOS artifacts (nightly)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/api-key.p8
          ELECTRON_BUILDER_PUBLISH: never
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm build:desktop

      - name: Apple sign cleanup
        if: always()
        uses: ./.github/actions/apple-sign-cleanup

      - name: Collect artifacts
        id: artifacts
        env:
          NIGHTLY_VERSION: ${{ steps.version.outputs.nightly_version }}
        run: |
          set -euo pipefail
          STAGING="$RUNNER_TEMP/nightly-artifacts"
          mkdir -p "$STAGING"
          for f in apps/desktop/dist-builder/*.dmg; do
            cp "$f" "$STAGING/"
          done
          for f in apps/desktop/dist-builder/*-mac.zip; do
            cp "$f" "$STAGING/"
          done
          if [ -f apps/desktop/dist-builder/latest-mac.yml ]; then
            cp apps/desktop/dist-builder/latest-mac.yml "$STAGING/"
          fi
          echo "staging=$STAGING" >> "$GITHUB_OUTPUT"
          ls -la "$STAGING"

      - name: Publish rolling "nightly" GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          NIGHTLY_VERSION: ${{ steps.version.outputs.nightly_version }}
          STAGING: ${{ steps.artifacts.outputs.staging }}
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          TAG="nightly"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" \
            --target "$GH_SHA" \
            --title "Nightly build ($NIGHTLY_VERSION)" \
            --notes "Latest unstable build from main. Version: $NIGHTLY_VERSION. Commit: $GH_SHA. Not published to stable updater channel." \
            --prerelease \
            "$STAGING"/*
