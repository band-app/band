name: CI

on:
  push:
    branches: [main]
  pull_request_target:
    types: [labeled, synchronize]
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Test & Build
    runs-on: [self-hosted]

    # Always run on push to main.
    # For PRs, only run when the 'ci:approved' label is present.
    # Maintainers: review the PR, then add the label to trigger CI.
    # New commits (synchronize) re-run automatically while the label is present.
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:approved')

    env:
      NODE_OPTIONS: "--max-old-space-size=6144"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For PRs, checkout the PR head commit (safe because label gates access)
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build CLI
        run: cargo build --release --manifest-path apps/cli/Cargo.toml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm exec biome check .

      - name: Check unused exports & dependencies (knip)
        run: pnpm knip

      - name: Check code duplication (jscpd)
        run: pnpm jscpd

      - name: Lint (cargo fmt)
        run: |
          cargo fmt --manifest-path apps/cli/Cargo.toml -- --check
          cargo fmt --manifest-path apps/dashboard/src-tauri/Cargo.toml -- --check

      - name: Lint (cargo clippy — CLI)
        run: cargo clippy --manifest-path apps/cli/Cargo.toml -- -D warnings

      - name: Lint (cargo clippy — Dashboard)
        run: |
          mkdir -p apps/web/dist apps/dashboard/src-tauri/binaries extensions/vscode/dist
          touch apps/web/dist/start-server.mjs extensions/vscode/dist/extension.js
          cp apps/cli/target/release/band "apps/dashboard/src-tauri/binaries/band-$(rustc -vV | sed -n 's/host: //p')"
          cargo clippy --manifest-path apps/dashboard/src-tauri/Cargo.toml -- -D warnings

      - name: Build web (needed by tests)
        run: pnpm build:web

      - name: Test (web)
        run: pnpm --filter @band-app/server test

      - name: Wait for apt lock
        run: while sudo fuser /var/lib/apt/lists/lock /var/lib/dpkg/lock /var/lib/dpkg/lock-frontend 2>/dev/null; do echo "Waiting for apt lock..."; sleep 5; done

      - name: Install Playwright Chromium
        run: pnpm --filter @band-app/server exec playwright install --with-deps chromium

      - name: Test e2e (web)
        run: pnpm --filter @band-app/server test:e2e

      - name: Test (CLI)
        run: cargo test --manifest-path apps/cli/Cargo.toml -- --test-threads=4

      - name: Test (Dashboard)
        run: cargo test --manifest-path apps/dashboard/src-tauri/Cargo.toml

      - name: Build frontend
        run: pnpm --filter @band-app/dashboard build
