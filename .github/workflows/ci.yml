name: CI

on:
  push:
    branches: [main]
  # Use `pull_request` (NOT `pull_request_target`). The latter runs in the base
  # repo's context with secret access and shared-cache write privilege, while
  # checking out the fork's untrusted code ‚Äî the exact "pwn request" + cache
  # poisoning chain described in the TanStack npm supply-chain compromise
  # postmortem (https://tanstack.com/blog/npm-supply-chain-compromise-postmortem).
  # `pull_request` runs fork PR code in an isolated context with no secrets and
  # PR-scoped cache writes, so a malicious PR cannot poison main's caches or
  # exfiltrate NPM_TOKEN / signing creds.
  pull_request:
    types: [opened, reopened, labeled, synchronize]
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    # Always run on push to main.
    # For same-repo PRs (collaborators): run automatically.
    # For fork PRs: only run when a maintainer adds the 'ci:approved' label.
    # The label gate is now a cost filter (don't burn CI minutes on every
    # drive-by fork PR), NOT a security barrier ‚Äî the trigger above already
    # isolates fork PRs from secrets and shared cache writes.
    # Note: under `pull_request`, fork PRs run the fork's own ci.yml, so this
    # gate is also unreliable as a cost control ‚Äî a malicious or zealous fork
    # can simply remove the `if:` and burn minutes. Stricter cost controls
    # (e.g. paused-by-default workflows, billing limits) belong at the
    # GitHub Actions account/org level, not in YAML the fork can edit.
    if: >
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository ||
      contains(github.event.pull_request.labels.*.name, 'ci:approved')

    env:
      NODE_OPTIONS: "--max-old-space-size=6144"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Restore caches always (safe to read from untrusted runs). Saves are
      # split out below and gated on trusted events as defence-in-depth ‚Äî
      # see "Save ‚Ä¶ cache" steps near the end of the job. IMPORTANT: keep
      # `path` and `key` in lock-step between Restore and Save halves; an
      # edit to one without the matching change to the other silently
      # creates dangling cache entries. (A previous attempt to hoist these
      # to job-level `env:` failed because `runner.os` isn't available in
      # `jobs.<id>.env` context ‚Äî GitHub couldn't parse the workflow.)
      - name: Restore Cargo registry cache
        id: cache-cargo-registry
        uses: actions/cache/restore@v5
        with:
          # When editing path/key here, mirror in "Save Cargo registry cache".
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-

      - name: Restore CLI target cache
        id: cache-cargo-cli
        uses: actions/cache/restore@v5
        with:
          # When editing path/key here, mirror in "Save CLI target cache".
          path: apps/cli/target
          key: cargo-cli-${{ runner.os }}-${{ hashFiles('apps/cli/Cargo.lock') }}
          restore-keys: cargo-cli-${{ runner.os }}-

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Build CLI
        run: cargo build --release --manifest-path apps/cli/Cargo.toml

      # node-pty 1.1.0 ships no linux-x64 prebuild and falls back to
      # `node-gyp rebuild` during `pnpm install`. pnpm/action-setup@v6 no
      # longer surfaces pnpm's bundled node-gyp on PATH, so we install it
      # explicitly to keep the install step working on ubuntu-latest.
      - name: Install node-gyp
        run: npm install -g node-gyp

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm exec biome check .

      - name: Check unused exports & dependencies (knip)
        run: pnpm knip

      - name: Check code duplication (jscpd)
        run: pnpm jscpd

      - name: Lint (cargo fmt)
        run: cargo fmt --manifest-path apps/cli/Cargo.toml -- --check

      - name: Lint (cargo clippy ‚Äî CLI)
        run: cargo clippy --manifest-path apps/cli/Cargo.toml -- -D warnings

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/**/*.[jt]s', 'apps/web/**/*.[jt]sx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Build web (needed by tests)
        run: pnpm build:web

      - name: Test (web)
        run: pnpm --filter @band-app/server test

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: pnpm --filter @band-app/server exec playwright install --with-deps chromium

      - name: Test e2e (web)
        run: pnpm --filter @band-app/server test:e2e

      # Playwright writes per-failure error-context.md snapshots (+ any traces)
      # into test-results/. Without this upload a CI-only e2e flake leaves
      # nothing to diagnose beyond the assertion message in the log.
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: apps/web/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Test (CLI)
        run: cargo test --manifest-path apps/cli/Cargo.toml -- --test-threads=4

      # Cache writes (defence-in-depth). Even though our CI trigger is now
      # `pull_request` (PR-scoped cache writes can't poison main), gating the
      # save explicitly on a trusted event ensures a future workflow change
      # that re-introduces `pull_request_target` cannot pollute the shared
      # cargo caches that release.yml and nightly.yml also consume. Skipped
      # entirely on an exact restore-key hit so we don't re-write identical
      # state. See: TanStack npm supply-chain compromise postmortem.
      #
      # The two save steps differ in their failure semantics:
      #
      #   - Cargo registry cache: `always()` so we save even when later
      #     steps fail or the job is cancelled. The registry holds
      #     downloaded crate tarballs plus an index ‚Äî a cancellation
      #     mid-download may leave incomplete files, but cargo
      #     re-validates against the index on the next run, so a re-save
      #     is safe.
      #
      #   - CLI target cache: defaults to `success()` (no `always()`). The
      #     target dir holds incremental compiler artifacts ‚Äî saving them
      #     after a failed cargo build/test can produce a cache entry that
      #     poisons the next run with broken incremental state.
      #
      # The trust gate explicitly excludes BOTH `pull_request` and
      # `pull_request_target`; the latter would otherwise sneak past a
      # `!= 'pull_request'` short-circuit (`pull_request_target` is a
      # distinct event name) and re-introduce the exact poisoning vector
      # this PR is meant to block as defence-in-depth. Non-PR triggers
      # (push, workflow_dispatch, schedule, repository_dispatch,
      # workflow_call, ‚Ä¶) remain allowed without an explicit allowlist
      # entry. NOTE for workflow_call: if ci.yml is ever exposed as a
      # reusable workflow, `github.event_name` reflects the CALLER's
      # event, so a caller running under `pull_request_target` would
      # propagate that here and (correctly) be blocked.
      - name: Save Cargo registry cache
        if: |
          always() &&
          steps.cache-cargo-registry.outputs.cache-hit != 'true' &&
          ((github.event_name != 'pull_request' &&
            github.event_name != 'pull_request_target') ||
           github.event.pull_request.head.repo.full_name == github.repository)
        # Best-effort: if the registry save fails (cache size limits,
        # transient service error), don't poison the job ‚Äî the CLI-target
        # save's `success()` gate would otherwise skip silently.
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          # When editing path/key here, mirror in "Restore Cargo registry cache".
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      # NOTE on placement: save steps land here, after `Test (CLI)` and
      # before `Build desktop`. That's fine today because no Cargo step
      # runs after this point ‚Äî TypeScript/Node desktop build doesn't
      # touch apps/cli/target. If a future Rust step is added later in
      # the job, move both save steps to the very end so its output
      # gets cached.
      - name: Save CLI target cache
        # No `success()` ‚Äî GitHub Actions applies it implicitly when no
        # status function is present in the expression. Mirroring that
        # default keeps the contrast with the registry-save `always()`
        # explicit: registry saves even on failure/cancel, CLI target
        # only on a clean run (so we don't cache broken incremental state).
        if: |
          steps.cache-cargo-cli.outputs.cache-hit != 'true' &&
          ((github.event_name != 'pull_request' &&
            github.event_name != 'pull_request_target') ||
           github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/cache/save@v5
        with:
          # When editing path/key here, mirror in "Restore CLI target cache".
          path: apps/cli/target
          key: cargo-cli-${{ runner.os }}-${{ hashFiles('apps/cli/Cargo.lock') }}

      - name: Build desktop (TypeScript main + preload)
        run: pnpm --filter @band-app/desktop build

      - name: Test (desktop)
        run: pnpm --filter @band-app/desktop test

  # ---------------------------------------------------------------------------
  # macOS CLI integration tests.
  #
  # The main `check` job runs the CLI integration tests only on ubuntu-latest,
  # but several Band paths behave differently on macOS ‚Äî most notably the
  # `/var/folders` ‚Üí `/private/var/folders` symlink that canonicalize() and git
  # resolve but a raw temp path does not. That mismatch silently dropped
  # seeded worktrees during path-string reconciliation (the server reconciles
  # worktrees by path equality since #606) and broke four CLI integration tests
  # ‚Äî a failure that passes on every Linux PR (no `/private` symlink) and only
  # surfaced on the macos-latest release runner for v0.24.0 (harness fix: #608).
  #
  # This job closes that gap by exercising the CLI integration tests on macOS on
  # every relevant change. It is a SEPARATE, CLI-only job ‚Äî NOT a macOS clone of
  # `check` ‚Äî because macOS runners are slower and costlier, so we only pay for
  # the surface that actually has a macOS-specific failure mode. The lightweight
  # `cli-macos-changes` job below gates it: PRs that don't touch the
  # CLI/worktree/sync surface skip the macOS runner entirely.
  # ---------------------------------------------------------------------------
  cli-macos-changes:
    name: Detect CLI-relevant changes
    runs-on: ubuntu-latest
    # Mirror the `check` job's cost gate: run on push to main, on same-repo PRs
    # (collaborators), and on fork PRs a maintainer labelled `ci:approved`.
    if: >
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository ||
      contains(github.event.pull_request.labels.*.name, 'ci:approved')
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          # Full history so the base commit is reachable for the diff below.
          fetch-depth: 0

      # Native git-diff path gate ‚Äî same idiom as the "Check for docs changes"
      # step in deploy-docs, so we don't add a third-party action to a workflow
      # this security-conscious repo deliberately runs under `pull_request`
      # (no secrets, PR-scoped cache). Fails OPEN: any ambiguity about the base
      # runs the macOS job rather than risk skipping a real regression.
      - name: Detect CLI-relevant changes
        id: filter
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          # No usable base (first push, force-push, all-zero SHA): fail open.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # `fetch-depth: 0` above already pulls full history, so $BASE is
          # normally present. This shallow fetch is a belt-and-suspenders net
          # for the edge case where the base branch was force-pushed and $BASE
          # (recorded at PR-creation time) is orphaned from the fetched refs ‚Äî
          # GitHub still serves the loose commit. Then diff against the merge
          # base (three-dot) so we only see what THIS branch changed, not
          # unrelated commits that landed on main. Any git error ‚Üí fail open.
          git fetch --no-tags --depth=1 origin "$BASE" 2>/dev/null || true
          if ! CHANGED=$(git diff --name-only "$BASE...$HEAD" 2>/dev/null); then
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # Keep this list in sync with the surface that can trigger the
          # macOS-only worktree path-reconciliation bug: the CLI + its test
          # harness, the server sync/workspace services, the workspaces query
          # layer, and this workflow file itself.
          if printf '%s\n' "$CHANGED" | grep -qE '^(apps/cli/|apps/web/src/server/services/(sync-service|workspace-service)\.ts$|apps/web/src/server/infra/db/queries/workspaces\.ts$|\.github/workflows/ci\.yml$)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  cli-macos:
    name: CLI Integration Tests (macOS)
    runs-on: macos-latest
    needs: cli-macos-changes
    if: needs.cli-macos-changes.outputs.run == 'true'
    env:
      NODE_OPTIONS: "--max-old-space-size=6144"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # `runner.os` is "macOS" here, so these keys are naturally distinct from
      # the ubuntu `check` job's `Linux` cache entries ‚Äî no cross-OS collision.
      # See the `check` job for the full restore/save rationale; keep each
      # Restore/Save pair's path & key in lock-step.
      - name: Restore Cargo registry cache
        id: cache-cargo-registry
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-

      - name: Restore CLI target cache
        id: cache-cargo-cli
        uses: actions/cache/restore@v5
        with:
          path: apps/cli/target
          key: cargo-cli-${{ runner.os }}-${{ hashFiles('apps/cli/Cargo.lock') }}
          restore-keys: cargo-cli-${{ runner.os }}-

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # macos-latest ships node-pty's darwin prebuild, so (unlike the ubuntu
      # job) no explicit `node-gyp` install is needed ‚Äî matches release.yml.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the web server bundle the integration tests drive: each test
      # boots `apps/web/dist/start-server.mjs` (a real node Band server) and
      # runs CLI commands against it. The CLI binary itself is compiled by the
      # `cargo test` step below via `env!("CARGO_BIN_EXE_band")` (test profile),
      # so ‚Äî unlike the `check`/`release` jobs ‚Äî there is deliberately NO
      # separate `cargo build --release` step here: those jobs release-build the
      # CLI only so their *web* tests can shell out to a real `band` on PATH,
      # and this CLI-only job runs no web tests. Dropping the release build
      # avoids compiling the crate twice on the slower/costlier macOS runner
      # (the exact cost #609 asks us to economise on).
      - name: Build web (needed by tests)
        run: pnpm build:web

      # Keep --test-threads=4 (matching ci.yml `check` and release.yml): each
      # test boots its own real Band server on a random port, and unbounded
      # parallelism floods the slower macOS runner so servers aren't ready when
      # `workspaces create` dispatches, flaking the worktree-dependent tests.
      - name: Test (CLI)
        run: cargo test --manifest-path apps/cli/Cargo.toml -- --test-threads=4

      # Cache writes, gated on trusted events as defence-in-depth ‚Äî same policy
      # and failure semantics as the `check` job (registry saves `always()`,
      # CLI target only on `success()` so broken incremental state isn't cached).
      - name: Save Cargo registry cache
        if: |
          always() &&
          steps.cache-cargo-registry.outputs.cache-hit != 'true' &&
          ((github.event_name != 'pull_request' &&
            github.event_name != 'pull_request_target') ||
           github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Save CLI target cache
        if: |
          steps.cache-cargo-cli.outputs.cache-hit != 'true' &&
          ((github.event_name != 'pull_request' &&
            github.event_name != 'pull_request_target') ||
           github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/cache/save@v5
        with:
          path: apps/cli/target
          key: cargo-cli-${{ runner.os }}-${{ hashFiles('apps/cli/Cargo.lock') }}

  deploy-docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for docs changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- apps/website/ || true)
          if [ -z "$CHANGED" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.changes.outputs.changed == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build docs
        if: steps.changes.outputs.changed == 'true'
        run: pnpm --filter @band-app/docs build
        env:
          # PostHog analytics ‚Äî public-by-design project key, safe to expose in
          # the built bundle but kept in secrets for parity with other config.
          # Astro inlines PUBLIC_* env vars at build time, so they must be set
          # here (Cloudflare Pages dashboard vars do NOT apply ‚Äî we only upload
          # the prebuilt dist/ to Pages, we don't build on Pages).
          PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}

      - name: Deploy to Cloudflare Pages
        if: steps.changes.outputs.changed == 'true'
        run: npx wrangler pages deploy apps/website/dist --project-name=band-docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
