name: CI

on:
  push:
    branches: [main]
  # Use `pull_request` (NOT `pull_request_target`). The latter runs in the base
  # repo's context with secret access and shared-cache write privilege, while
  # checking out the fork's untrusted code — the exact "pwn request" + cache
  # poisoning chain described in the TanStack npm supply-chain compromise
  # postmortem (https://tanstack.com/blog/npm-supply-chain-compromise-postmortem).
  # `pull_request` runs fork PR code in an isolated context with no secrets and
  # PR-scoped cache writes, so a malicious PR cannot poison main's caches or
  # exfiltrate NPM_TOKEN / signing creds.
  pull_request:
    types: [opened, reopened, labeled, synchronize]
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    # Always run on push to main.
    # For same-repo PRs (collaborators): run automatically.
    # For fork PRs: only run when a maintainer adds the 'ci:approved' label.
    # The label gate is now a cost filter (don't burn CI minutes on every
    # drive-by fork PR), NOT a security barrier — the trigger above already
    # isolates fork PRs from secrets and shared cache writes.
    # Note: under `pull_request`, fork PRs run the fork's own ci.yml, so this
    # gate is also unreliable as a cost control — a malicious or zealous fork
    # can simply remove the `if:` and burn minutes. Stricter cost controls
    # (e.g. paused-by-default workflows, billing limits) belong at the
    # GitHub Actions account/org level, not in YAML the fork can edit.
    if: >
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository ||
      contains(github.event.pull_request.labels.*.name, 'ci:approved')

    env:
      NODE_OPTIONS: "--max-old-space-size=6144"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Restore caches always (safe to read from untrusted runs). Saves are
      # split out below and gated on trusted events as defence-in-depth —
      # see "Save … cache" steps near the end of the job. IMPORTANT: keep
      # `path` and `key` in lock-step between Restore and Save halves; an
      # edit to one without the matching change to the other silently
      # creates dangling cache entries.
      - name: Restore Cargo registry cache
        id: cache-cargo-registry
        uses: actions/cache/restore@v5
        with:
          # When editing path/key here, mirror in "Save Cargo registry cache".
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-

      - name: Restore CLI target cache
        id: cache-cargo-cli
        uses: actions/cache/restore@v5
        with:
          # When editing path/key here, mirror in "Save CLI target cache".
          path: apps/cli/target
          key: cargo-cli-${{ runner.os }}-${{ hashFiles('apps/cli/Cargo.lock') }}
          restore-keys: cargo-cli-${{ runner.os }}-

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build CLI
        run: cargo build --release --manifest-path apps/cli/Cargo.toml

      # node-pty 1.1.0 ships no linux-x64 prebuild and falls back to
      # `node-gyp rebuild` during `pnpm install`. pnpm/action-setup@v6 no
      # longer surfaces pnpm's bundled node-gyp on PATH, so we install it
      # explicitly to keep the install step working on ubuntu-latest.
      - name: Install node-gyp
        run: npm install -g node-gyp

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm exec biome check .

      - name: Check unused exports & dependencies (knip)
        run: pnpm knip

      - name: Check code duplication (jscpd)
        run: pnpm jscpd

      - name: Lint (cargo fmt)
        run: cargo fmt --manifest-path apps/cli/Cargo.toml -- --check

      - name: Lint (cargo clippy — CLI)
        run: cargo clippy --manifest-path apps/cli/Cargo.toml -- -D warnings

      - name: Build web (needed by tests)
        run: pnpm build:web

      - name: Test (web)
        run: pnpm --filter @band-app/server test

      - name: Install Playwright Chromium
        run: pnpm --filter @band-app/server exec playwright install --with-deps chromium

      - name: Test e2e (web)
        run: pnpm --filter @band-app/server test:e2e

      - name: Test (CLI)
        run: cargo test --manifest-path apps/cli/Cargo.toml -- --test-threads=4

      # Cache writes (defence-in-depth). Even though our CI trigger is now
      # `pull_request` (PR-scoped cache writes can't poison main), gating the
      # save explicitly on a trusted event ensures a future workflow change
      # that re-introduces `pull_request_target` cannot pollute the shared
      # cargo caches that release.yml and nightly.yml also consume. Skipped
      # entirely on an exact restore-key hit so we don't re-write identical
      # state. See: TanStack npm supply-chain compromise postmortem.
      #
      # The two save steps differ in their failure semantics:
      #
      #   - Cargo registry cache: `always()` so we save even when later
      #     steps fail. The registry holds downloaded crate tarballs plus
      #     an index — a job cancelled mid-download may leave incomplete
      #     files, but cargo re-validates against the index on the next
      #     run, so a re-save is safe.
      #
      #   - CLI target cache: defaults to `success()` (no `always()`). The
      #     target dir holds incremental compiler artifacts — saving them
      #     after a failed cargo build/test can produce a cache entry that
      #     poisons the next run with broken incremental state.
      #
      # The trust gate is phrased as "not a pull_request, OR a same-repo
      # PR" rather than enumerating allowed event types. New triggers
      # (workflow_dispatch, schedule, repository_dispatch, …) are allowed
      # by default and only forks are blocked, which is the invariant we
      # actually want.
      - name: Save Cargo registry cache
        if: |
          always() &&
          steps.cache-cargo-registry.outputs.cache-hit != 'true' &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/cache/save@v5
        with:
          # When editing path/key here, mirror in "Restore Cargo registry cache".
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Save CLI target cache
        if: |
          success() &&
          steps.cache-cargo-cli.outputs.cache-hit != 'true' &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/cache/save@v5
        with:
          # When editing path/key here, mirror in "Restore CLI target cache".
          path: apps/cli/target
          key: cargo-cli-${{ runner.os }}-${{ hashFiles('apps/cli/Cargo.lock') }}

      - name: Build desktop (TypeScript main + preload)
        run: pnpm --filter @band-app/desktop build

      - name: Test (desktop)
        run: pnpm --filter @band-app/desktop test

  deploy-docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for docs changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- apps/website/ || true)
          if [ -z "$CHANGED" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.changes.outputs.changed == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build docs
        if: steps.changes.outputs.changed == 'true'
        run: pnpm --filter @band-app/docs build

      - name: Deploy to Cloudflare Pages
        if: steps.changes.outputs.changed == 'true'
        run: npx wrangler pages deploy apps/website/dist --project-name=band-docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
