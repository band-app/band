name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version (e.g. 1.2.3). Leave empty to use bump or auto-detect."
        required: false
        type: string
      bump:
        description: "Bump type. Leave empty to auto-detect from commits."
        required: false
        type: choice
        default: ""
        options:
          - ""
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: macos-latest
    environment: production
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-

      - name: Cache CLI target
        uses: actions/cache@v5
        with:
          path: apps/cli/target
          key: cargo-cli-${{ runner.os }}-${{ hashFiles('apps/cli/Cargo.lock') }}
          restore-keys: cargo-cli-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            BUMP_ARGS="--version ${{ inputs.version }}"
          elif [ -n "${{ inputs.bump }}" ]; then
            BUMP_ARGS="--bump ${{ inputs.bump }}"
          else
            BUMP_ARGS="--from-commits"
          fi
          NEW_VERSION=$(node scripts/bump-version.mjs $BUMP_ARGS --dry-run 2>&1 | grep "^Version:" | sed 's/Version: .* → //')
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump_args=$BUMP_ARGS" >> "$GITHUB_OUTPUT"
          echo "Will release version: $NEW_VERSION"

      - name: Verify tag does not exist
        run: |
          if git rev-parse "v${{ steps.version.outputs.new_version }}" >/dev/null 2>&1; then
            echo "Error: Tag v${{ steps.version.outputs.new_version }} already exists"
            exit 1
          fi

      - name: Bump versions
        run: node scripts/bump-version.mjs ${{ steps.version.outputs.bump_args }}

      - name: Lint
        run: |
          pnpm exec biome check .
          pnpm knip
          pnpm jscpd
          cargo fmt --manifest-path apps/cli/Cargo.toml -- --check
          cargo clippy --manifest-path apps/cli/Cargo.toml -- -D warnings

      # Build the CLI before running the JS tests. Some tests (e.g.
      # `apps/web/tests/cli-skills.test.ts`) shell out to `band skills install`
      # to verify the production sync path against the real binary. The cargo
      # cache key only hashes `apps/cli/Cargo.lock`, so a source-only change
      # (skill templates, command surface) restores a stale binary that
      # produces output mismatched with the current test expectations. The CI
      # workflow already does this before its test step (.github/workflows/ci.yml);
      # mirror it here so release runs aren't tripped up by the same staleness.
      - name: Build CLI
        run: cargo build --release --manifest-path apps/cli/Cargo.toml

      # Pin --test-threads=4 to match ci.yml. Each CLI integration test boots
      # a real node Band server on its own port (TestEnv::new), and
      # `workspaces create` dispatches to it. With unbounded parallelism the
      # macos-latest runner boots too many servers at once; some aren't ready
      # when create dispatches, so the worktree never registers and the
      # workspaces_list_*/chat_auto_detects_workspace_from_cwd tests flake
      # (see run 28698582656). CI already caps this; mirror it here.
      - name: Test
        run: |
          pnpm --filter @band-app/server test
          cargo test --manifest-path apps/cli/Cargo.toml -- --test-threads=4

      - name: Build frontend
        env:
          BAND_BUILD_SHA: ${{ github.sha }}
          BAND_BUILD_CHANNEL: stable
        run: pnpm build:web

      - name: Apple sign setup
        uses: ./.github/actions/apple-sign-setup
        with:
          apple-certificate: ${{ secrets.APPLE_CERTIFICATE }}
          apple-certificate-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          apple-api-key: ${{ secrets.APPLE_API_KEY }}

      # Builds, signs, and notarizes the Electron desktop app, then produces
      # the macOS DMG + zip artifacts (Windows + Linux are out of scope per
      # `apps/desktop/electron-builder.yml`).
      - name: Build desktop (Electron) macOS artifacts
        run: pnpm build:desktop
        env:
          # electron-builder reads APPLE_SIGNING_IDENTITY directly to sign
          # the outer .app; deep-sign-mac.mjs reads it to sign the nested
          # native binaries inside Resources/web/.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Notarization credentials consumed by apps/desktop/scripts/notarize.mjs
          # via the afterSign hook. The .p8 file at $RUNNER_TEMP/api-key.p8 is
          # written by the apple-sign-setup action and persists through this job.
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/api-key.p8
          # Skip electron-builder's auto-publish — the release step below
          # uploads the artifacts to the GitHub release explicitly.
          ELECTRON_BUILDER_PUBLISH: never
          # Even with publish=never, electron-builder still instantiates the
          # GitHub publisher declared in electron-builder.yml to compute
          # artifact metadata (latest-mac.yml / app-update.yml). That
          # construction requires GH_TOKEN/GITHUB_TOKEN to be set, otherwise
          # PublishManager.artifactCreatedWithoutExplicitPublishConfig throws
          # "GitHub Personal Access Token is not set" once per artifact and
          # fails the job. The auto-issued GITHUB_TOKEN is sufficient — no
          # upload happens because publish=never.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Apple sign cleanup
        if: always()
        uses: ./.github/actions/apple-sign-cleanup

      # Give the user-facing DMGs unambiguous arch suffixes
      # (Band-X.dmg → Band-X-intel.dmg, Band-X-arm64.dmg →
      # Band-X-apple-silicon.dmg) so people don't accidentally download
      # the Intel build on Apple Silicon (or vice versa). Only DMGs are
      # renamed — the `.zip` artifacts referenced from `latest-mac.yml`
      # keep the `-arm64` substring that electron-updater's MacUpdater
      # uses to pick the right auto-update file. See the script header
      # for the full rationale.
      - name: Rename DMGs to intel/apple-silicon
        working-directory: apps/desktop
        run: node scripts/rename-dmgs-by-arch.mjs

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" --no-merges | grep -v "^- chore: release" || true)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges | grep -v "^- chore: release" || true)
          fi
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin "v${{ steps.version.outputs.new_version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: v${{ steps.version.outputs.new_version }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            apps/desktop/dist-builder/*.dmg
            apps/desktop/dist-builder/*-mac.zip
            apps/desktop/dist-builder/latest-mac.yml

      - name: Publish to npm
        working-directory: apps/web
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
